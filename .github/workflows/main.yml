name: Verificação de build

on:
  push:
    branches:
      - develop

jobs:
  build:
   runs-on: ubuntu-latest
   steps:
      - name: Checkout no código
        uses: actions/checkout@v4

      - name: Instalar o Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instala dependências
        run: npm install

      - name: Roda os build
        run: npm run build